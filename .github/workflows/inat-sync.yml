name: iNat Sync

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      backfill:
        type: boolean
        default: false
        description: "Import full history grouped by observed date"

permissions:
  contents: write
  actions: write

concurrency:
  group: inat-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.1"
          bundler-cache: true

      - name: Sync observations
        run: ruby scripts/inat_sync.rb ${{ inputs.backfill == true && '--backfill' || '' }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Build gate
        run: bundle exec jekyll build --strict_front_matter
        env:
          JEKYLL_ENV: production

      - name: Commit and push
        id: commit
        run: |
          if [ -z "$(git status --porcelain _posts _data)" ]; then
            echo "No changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts _data
          git commit -m "Sync iNaturalist observations"
          git pull --rebase origin main
          git push origin main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN pushes don't fire on:push workflows, so trigger deploy explicitly
      - name: Trigger deploy
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
