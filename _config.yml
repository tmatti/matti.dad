title: matti.dad
tagline: "field notes from the woods and the terminal"
description: "A blog by Tim Matti — Ruby, Rails, AI, bowhunting, archery, and being a dad in the woods."
url: "https://matti.dad"
baseurl: ""
inat_user: tmatti
timezone: America/New_York

author:
  name: Tim Matti
  email: tim@matti.dad
  github: tmatti

permalink: /:year/:month/:slug/

collections:
  pages:
    output: true

plugins:
  - jekyll-feed
  - jekyll-seo-tag

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

exclude:
  - Gemfile
  - Gemfile.lock
  - CLAUDE.md
  - AGENTS.md
  - README.md
  - .mise.toml
  - .ruby-lsp/
  - .claude/
  - node_modules/
  - package.json
  - package-lock.json
  - src/
  - bin/
  - scripts/
