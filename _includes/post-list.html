{% assign posts = include.posts | default: site.posts %}
<ol class="post-list" reversed>
  {% for post in posts %}
  <li class="post-item">
    <div class="post-item-meta">
      <time class="post-item-date" datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%Y-%m-%d" }}</time>
      {% if post.tags.size > 0 %}
        <span class="post-item-tags">
          {% for tag in post.tags %}
            {% include tag-chip.html tag=tag %}
          {% endfor %}
        </span>
      {% endif %}
    </div>
    <a href="{{ post.url | relative_url }}" class="post-item-title">{{ post.title }}</a>
  </li>
  {% endfor %}
</ol>
